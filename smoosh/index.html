<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0221">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SMOOSH!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><rect width='32' height='32' rx='7' fill='%23141020'/><ellipse cx='16' cy='19' rx='11' ry='9' fill='%237dffb2'/><circle cx='12' cy='17' r='1.8' fill='%23141020'/><circle cx='20' cy='17' r='1.8' fill='%23141020'/><path d='M13 22 Q16 24 19 22' stroke='%23141020' stroke-width='1.6' fill='none'/></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container"></div>
    <!-- v5.0 RETRO ARCADE Task 2: CRT scanline/vignette overlay - see
         css/style.css #crt (pointer-events:none, sits above the canvas). -->
    <div id="crt"></div>
    <div id="landscape-warning">
        <div class="rotate-icon">&#x1F4F1;</div>
        <div>PLEASE ROTATE<br>TO PORTRAIT MODE</div>
    </div>

    <!-- Phaser 3.60 (vendored — offline-capable) -->
    <script src="lib/phaser.min.js"></script>

    <!-- Firebase 10 compat SDK (vendored) + project config. fbconfig.js now
         holds the live "smoosh" project config (Phase B Task 7); fb.js
         (loaded after i18n.js below) degrades to offline mode only if the
         config/SDK is ever unavailable (e.g. this script fails to load). -->
    <script src="lib/firebase-app-compat.js"></script>
    <script src="lib/firebase-auth-compat.js"></script>
    <script src="lib/firebase-firestore-compat.js"></script>
    <script src="js/fbconfig.js"></script>

    <!-- Game scripts (load order matters! main.js ALWAYS LAST) -->
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/fb.js"></script>
    <script src="js/balance.js"></script>
    <!-- v7 T12: INFINITE mode pure math (ramp/score/reward formulas) - only
         needs CONFIG (loaded above), same dependency profile as balance.js,
         so it's grouped right next to it. -->
    <script src="js/infiniteBalance.js"></script>
    <script src="js/nicknames.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/decor.js"></script>
    <!-- v5.0 RETRO ARCADE Task 5: rarity card frames - must load before any
         consumer (dex.js, shop.js, ui.js). -->
    <script src="js/frames.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/spawner.js"></script>
    <script src="js/save.js"></script>
    <!-- v7 T13: global rankings service - depends on fb.js's Social (uid/db/
         ready) + save.js's SaveManager (local best cache), both already
         loaded above; called from game.js/stagemap.js at RUNTIME only (not
         parse time), so loading here (well before those) is safe, same
         precedent as bonus.js/sandbox.js noted below. -->
    <script src="js/leaderboard.js"></script>
    <script src="js/gacha.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/sfx.js"></script>
    <script src="js/haptics.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/background.js"></script>
    <script src="js/ads.js"></script>
    <script src="js/iap.js"></script>
    <script src="js/monsters.js"></script>
    <script src="js/nest.js"></script>
    <script src="js/pets.js"></script>
    <script src="js/game.js"></script>
    <!-- v7 T12: InfiniteScene - a new self-contained Scene class reusing
         Monster/FieldPets/Nest/Effects/Feel/Spawner (all above), same
         precedent as pvp.js. Placed next to game.js (logical grouping);
         forward references to makeUiButton/fitToWidth/padTapArea/
         buildFeverGauge (ui.js, loaded later) are safe - they're only
         CALLED at scene-runtime, long after every script has parsed
         (game.js itself already relies on this exact ordering). -->
    <script src="js/infinitegame.js"></script>
    <script src="js/stagemap.js"></script>
    <script src="js/dex.js"></script>
    <script src="js/nestscene.js"></script>
    <script src="js/friends.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/pvp.js"></script>
    <!-- v7 T11: PAYDAY SMASH bonus stage - depends on effects.js/gacha.js/
         frames.js (all above) and ui.js's makeUiButton/fitToWidth, so it must
         load after those; called from game.js's afterStageClear() at RUNTIME
         only (not parse time), so it's safe to load after game.js too. -->
    <script src="js/bonus.js"></script>
    <!-- v7 Task 10: temp dev/test entry - SandboxScene must load after game.js/
         pets.js/monsters.js (reuses Monster/FieldPets classes) and before main.js
         (registers it in the scene array), same load-order rule as every scene. -->
    <script src="js/sandbox.js"></script>
    <!-- v7 Task 14: SubMainScene - the sub-main hub between MenuScene (now
         PLAY-only) and every destination scene. Depends on NestAI
         (nestscene.js), PET_SPECIES (catalog.js), Decor (decor.js), all
         loaded above; a forward reference to fitToWidth (ui.js, loaded
         later) is safe for the same reason noted on infinitegame.js's own
         script entry above - only ever CALLED at scene-runtime. -->
    <script src="js/submain.js"></script>
    <script src="js/main.js"></script><!-- ALWAYS LAST -->
</body>
</html>
